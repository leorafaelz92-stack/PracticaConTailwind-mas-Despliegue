<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Results summary component</title>
    <link rel="stylesheet" href="dist/output.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light-lavender font-hanken flex justify-center lg:mt-[10vw]">
    <main>
      <article class="bg-white max-w-3xl flex flex-col rounded-b-3xl lg:flex-row lg:rounded-3xl ">
        <section
          class="bg-light-royal-blue p-6 flex flex-col gap-2 items-center rounded-b-3xl lg:rounded-3xl"
        >
          <p class="text-pale-blue text-lg">Your Result</p>
          <div
            class="text-center bg-linear-to-t from-light-royal-blue to-violet-blue w-30 h-30 rounded-full flex flex-col justify-center"
          >
            <p class="text-white text-5xl font-bold ">76</p>
            <p class="text-pale-blue text-sm">of 100</p>
          </div>

          <p class="text-white text-2xl font-medium">Great</p>
          <p class="text-pale-blue text-center">
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </section>
        <section class="p-6 w-full flex flex-col gap-3 items-center">
          <p class="self-start text-dark-gray-blue font-bold">Summary</p>

          <section
            class="bg-red-50 w-full p-3 flex justify-between gap-1 rounded-lg"
          >
            <img src="assets/images/icon-reaction.svg" alt="icono" />
            <p class="text-light-red">Reaction</p>
            <p class="ml-auto">80 <span class="text-gray-400">/ 100</span></p>
          </section>
          <section
            class="bg-orange-50 w-full p-3 flex justify-between gap-1 rounded-lg"
          >
            <img src="assets/images/icon-memory.svg" alt="icono" />
            <p class="text-orangey-yellow">Memory</p>
            <p class="ml-auto">92 <span class="text-gray-400">/ 100</span></p>
          </section>
          <section
            class="bg-emerald-50 w-full p-3 flex justify-between gap-1 rounded-lg"
          >
            <img src="assets/images/icon-verbal.svg" alt="icono" />
            <p class="text-green-teal">Verbal</p>
            <p class="ml-auto">61 <span class="text-gray-400">/ 100</span></p>
          </section>
          <section
            class="bg-blue-50 w-full p-3 flex justify-between gap-1 rounded-lg"
          >
            <img src="assets/images/icon-visual.svg" alt="icono" />
            <p class="text-cobalt-blue">Visual</p>
            <p class="ml-auto">72 <span class="text-gray-400">/ 100</span></p>
          </section>

          <button class="bg-dark-gray-blue text-white w-full p-2 rounded-full cursor-pointer hover:bg-light-royal-blue">
            Continue
          </button>
        </section>
      </article>
    </main>
  </body>
</html>
